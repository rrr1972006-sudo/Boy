<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXON !!!</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

nav{
width:100%;
background:#111;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:22px;
font-weight:600;
}

.nav-links{
display:flex;
list-style:none;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

.nav-links a:hover{
color:#00bcd4;
}

/* burger */

.menu-btn{
display:none;
font-size:28px;
color:white;
cursor:pointer;
}

/* mobile */

@media (max-width:768px){

.nav-links{
position:absolute;
top:60px;
left:-100%;
width:100%;
background:#111;
flex-direction:column;
text-align:center;
padding:20px 0;
transition:0.3s;
}

.nav-links.active{
left:0;
}

.nav-links li{
margin:15px 0;
}

.menu-btn{
display:block;
}

}
.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
padding:20px;
}

.hero-content h1{
font-size:48px;
margin-bottom:20px;
}

.hero-content p{
font-size:18px;
margin-bottom:30px;
}

.hero-btn{
padding:12px 30px;
background:#00bcd4;
color:white;
text-decoration:none;
border-radius:5px;
transition:0.3s;
}

.hero-btn:hover{
background:#0097a7;
}

</style>
</head>

<body>

<nav>

<div class="logo">MySite</div>

<ul class="nav-links" id="navLinks">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

</nav>
<section class="hero">
<!-- Rasm qoshyabmiz 2 chi COMMIT bolyabdi  -->
 <img width="300px" height="300px" src="https://ferrari.scene7.com/is/image/ferrari/6673fe6511a59b0011ec0465-laferrari_20240627_cover_1920x108020centered_v2" alt="">

<!-- va rasm qoshildi etiborizx ucvhun rahmat -->
<!-- Xoji akaaa bu rasmga stilam berdik -->
<div class="hero-content">

<h1>Creative Web Development</h1>

<p>Zamonaviy va tez ishlaydigan web saytlar yaratamiz</p>

<a href="#" class="hero-btn">Boshlash</a>

</div>

</section>

<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

</script>

</body>
</html>
