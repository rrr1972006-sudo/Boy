<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXON</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

/* NAVBAR */

nav{
width:100%;
background:#111;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:22px;
font-weight:600;
}

.nav-links{
display:flex;
list-style:none;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:16px;
transition:0.3s;
}

.nav-links a:hover{
color:#00bcd4;
}

/* burger */

.menu-btn{
display:none;
font-size:28px;
color:white;
cursor:pointer;
}

/* mobile */

@media (max-width:768px){

.nav-links{
position:absolute;
top:60px;
left:-100%;
width:100%;
background:#111;
flex-direction:column;
text-align:center;
padding:20px 0;
transition:0.3s;
}

.nav-links.active{
left:0;
}

.nav-links li{
margin:15px 0;
}

.menu-btn{
display:block;
}

}
.features{
padding:80px 40px;
background:#ffffff;
text-align:center;
}

.features-title{
font-size:36px;
margin-bottom:50px;
}

.features-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.feature-card{
background:#7e36cc;
padding:30px;
width:300px;
border-radius:10px;
transition:0.3s;
}

.feature-card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.feature-card h3{
margin-bottom:15px;
}

</style>
</head>

<body>

<nav>

<div class="logo">MySite</div>

<ul class="nav-links" id="navLinks">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Portfolio</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="menu-btn" onclick="toggleMenu()">
☰
</div>

</nav>
<section class="features">

<h2 class="features-title">Our Services</h2>

<div class="features-container">

<div class="feature-card">
<h3>Web Development</h3>
<p>Zamonaviy va tez ishlaydigan web saytlar yaratamiz.</p>
</div>

<div class="feature-card">
<h3>UI / UX Design</h3>
<p>Qulay va chiroyli foydalanuvchi interfeysi yaratamiz.</p>
</div>

<div class="feature-card">
<h3>SEO Optimization</h3>
<p>Saytingizni qidiruv tizimlarida yuqoriga chiqaramiz.</p>
</div>

</div>

</section>

<script>

function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

</script>

</body>
</html>
